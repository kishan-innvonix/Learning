services:
  backend:
    image: backend:1.0
    build: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env

  frontend:
    image: frontend:1.0
    build: ./client
    ports:
      - "5173:5173"
    volumes: 
      - ./client:/app
    depends_on:
      - backend
    env_file:
     - ./client/.env