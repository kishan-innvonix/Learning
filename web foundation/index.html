<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="shortcut icon" href="./images/user.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <ul class="nav">
            <li id="title" class="titleColor"></li>
            <div class="menuIcon">
                <i class="fa-solid fa-list icon"></i>
                <div class="links">
                    <li class="linkItem"><a href="#contect">Contect</a></li>
                </div>
            </div>
        </ul>
    </header>
    <div class="container">
        <div class="left">
            <h1 class="heading">Hello, i am <span id="name" class="titleColor"></span></h1>
            <h2 id="about"></h2>
            <button class="aboutBtn">About</button>
            <ul id="skillContainer"></ul>
        </div>
        <div class="right">
            <div class="imgContainer">
                <img class="img" src="./images/user.png" alt="">
            </div>
        </div>
    </div>
    <div class="contectPage" id="contect">
        <h2 class="titleColor contactTitle">Contact Me</h2>
        <p class="contactText">
            Feel free to reach out to me for collaborations, projects, or just a friendly chat.
        </p>

        <div class="contactInfo">
            <div class="contactItem">
                <i class="fa-solid fa-envelope"></i>
                <span>email@example.com</span>
            </div>

            <div class="contactItem">
                <i class="fa-solid fa-phone"></i>
                <span>+91 98765 43210</span>
            </div>

            <div class="contactItem">
                <i class="fa-solid fa-location-dot"></i>
                <span>City, Country</span>
            </div>
        </div>

        <div class="socialLinks">
            <a class="socialLink" href="#" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
            <a class="socialLink" href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
            <a class="socialLink" href="#" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </div>
    <script src="script.js" ></script>
</body>
</html>
